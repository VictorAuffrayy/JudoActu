const PN_STORAGE_KEY = "judoactu_patchnotes_v2";

function loadPatchNotes() {
  try {
    const raw = localStorage.getItem(PN_STORAGE_KEY);
    if (raw) return JSON.parse(raw);
  } catch(e) {}
  return PATCH_NOTES_DEFAULT;
}

function savePatchNotes(data) {
  try { localStorage.setItem(PN_STORAGE_KEY, JSON.stringify(data)); } catch(e) {}
}

function hashImg(str) {
  let h = 0;
  for (let i = 0; i < (str||"").length; i++) h = (h * 31 + str.charCodeAt(i)) & 0xffff;
  return JUDO_POOL[h % JUDO_POOL.length];
}

async function fetchFromGoogle() {
  const res  = await fetch(API_URL);
  if (!res.ok) throw new Error(`HTTP ${res.status}`);
  const data = await res.json();
  if (!data.articles || data.articles.length === 0) throw new Error("Aucun article");
  return data.articles;
}

/* ══════════════════════════════════════════
   TRADUCTION AUTO EN FRANÇAIS VIA CLAUDE
   — 1 seul appel batch pour tous les articles non-FR
══════════════════════════════════════════ */

// Sources déjà en français — pas besoin de traduire
const FR_SOURCES = ["ffjudo", "lequipe", "eurosport", "judoside"];

function needsTranslation(article) {
  return !FR_SOURCES.includes(article.source);
}

async function translateArticles(articles) {
  const toTranslate = articles.filter(needsTranslation);
  if (toTranslate.length === 0) return articles;

  // Prépare le batch : id + title + body
  const batch = toTranslate.map(a => ({ id: a.id, title: a.title, body: a.body }));

  try {
    const res = await fetch("https://api.anthropic.com/v1/messages", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        model: "claude-sonnet-4-20250514",
        max_tokens: 1000,
        messages: [{
          role: "user",
          content: `Tu es un traducteur spécialisé en sport de combat. Traduis en français naturel et fluide les titres et résumés suivants (judo). Réponds UNIQUEMENT en JSON valide, sans backticks ni texte autour, avec exactement ce format :
[{"id":"...","title":"...","body":"..."}]

Articles à traduire :
${JSON.stringify(batch)}`
        }]
      })
    });

    const data = await res.json();
    const text = data.content?.map(b => b.text || "").join("") || "";
    const translated = JSON.parse(text);

    // Fusionne les traductions dans les articles originaux
    const map = {};
    translated.forEach(t => { map[t.id] = t; });

    return articles.map(a => {
      if (map[a.id]) return { ...a, title: map[a.id].title, body: map[a.id].body };
      return a;
    });
  } catch (err) {
    console.warn("Traduction échouée, articles en langue originale :", err.message);
    return articles; // fallback silencieux
  }
}

              background: activeDan===g.id ? (g.dan >= 9 ? "#e63900" : g.dan >= 4 ? "#c8102e" : "#1a1a1a") : "transparent",
              color: activeDan===g.id ? "#fff" : "var(--muted)",
              border: activeDan===g.id ? `2px solid ${g.dan >= 9 ? "#e63900" : g.dan >= 4 ? "#c8102e" : "#1a1a1a"}` : "2px solid var(--rule)",
            }}>
            {g.emoji} {g.label}
          </button>
        ))}
      </div>

      {/* Fiche du dan actif */}
      {grade && (
        <div key={grade.id} className="fade-up">
          {/* En-tête */}
          <div style={{ display:"flex", alignItems:"flex-start", gap:16, padding:"18px 20px", background:"var(--ink)", color:"var(--paper)", marginBottom:2 }}>
            <div style={{ fontSize:"2.4rem", lineHeight:1 }}>{grade.emoji}</div>
            <div style={{ flex:1 }}>
              <div style={{ display:"flex", alignItems:"center", gap:10, flexWrap:"wrap", marginBottom:6 }}>
                <span style={{ fontFamily:"'Playfair Display',serif", fontSize:"1.5rem", fontWeight:900 }}>{grade.label}</span>
                <span style={{ fontFamily:"'Barlow Condensed',sans-serif", fontSize:"0.7rem", letterSpacing:"0.12em", textTransform:"uppercase", fontStyle:"italic", color:"#aaa" }}>{grade.romaji}</span>
                <span style={{ fontFamily:"'Barlow Condensed',sans-serif", fontSize:"0.68rem", fontWeight:700, letterSpacing:"0.1em", padding:"3px 10px", borderRadius:2, background: grade.dan >= 9 ? "#e63900" : grade.dan >= 4 ? "#c8102e" : "#fff", color: grade.dan >= 4 ? "#fff" : "#111" }}>{grade.ceinture}</span>
              </div>
              <p style={{ fontFamily:"'Source Serif 4',serif", fontSize:"0.85rem", fontStyle:"italic", color:"#ccc", lineHeight:1.55 }}>{grade.intro}</p>
            </div>
          </div>

          {/* Grille des conditions */}
          <div style={{ display:"grid", gridTemplateColumns:"repeat(auto-fill, minmax(280px, 1fr))", gap:1, background:"var(--rule)" }}>
            {grade.sections.map((sec, i) => (
              <div key={i} style={{ background:"var(--paper)", padding:"14px 18px" }}>
                <div style={{ fontFamily:"'Barlow Condensed',sans-serif", fontSize:"0.6rem", fontWeight:700, letterSpacing:"0.18em", textTransform:"uppercase", color: grade.dan >= 9 ? "#e63900" : grade.dan >= 4 ? "#c8102e" : "#1a1a1a", marginBottom:5, borderBottom:`1px solid ${grade.dan >= 9 ? "#e6390030" : grade.dan >= 4 ? "#c8102e30" : "#1a1a1a30"}`, paddingBottom:4 }}>
                  {sec.title}
                </div>
                <p style={{ fontFamily:"'Source Serif 4',serif", fontSize:"0.84rem", lineHeight:1.6, color:"#2a2828" }}>{sec.text}</p>
              </div>
            ))}
          </div>

          {/* Footer fiche */}
          <div style={{ padding:"8px 0 4px", display:"flex", justifyContent:"space-between", alignItems:"center", marginTop:4, flexWrap:"wrap", gap:8 }}>
            <span style={{ fontFamily:"'Barlow Condensed',sans-serif", fontSize:"0.55rem", letterSpacing:"0.1em", textTransform:"uppercase", color:"var(--rule)" }}>
              Source : FFJudo / IJF · Conditions officielles saison 2025-2026 · Données vérifiées
            </span>
            <div style={{ display:"flex", gap:10 }}>
              {grade.id !== GRADES_DAN[0].id && (
                <button onClick={() => setActiveDan(GRADES_DAN[GRADES_DAN.findIndex(g=>g.id===grade.id)-1].id)}
                  style={{ fontFamily:"'Barlow Condensed',sans-serif", fontSize:"0.65rem", fontWeight:700, letterSpacing:"0.1em", textTransform:"uppercase", color:"var(--muted)", padding:"5px 12px", border:"1px solid var(--rule)", borderRadius:2, background:"none", cursor:"pointer" }}>
                  ← Grade précédent
                </button>
              )}
              {grade.id !== GRADES_DAN[GRADES_DAN.length-1].id && (
                <button onClick={() => setActiveDan(GRADES_DAN[GRADES_DAN.findIndex(g=>g.id===grade.id)+1].id)}
                  style={{ fontFamily:"'Barlow Condensed',sans-serif", fontSize:"0.65rem", fontWeight:700, letterSpacing:"0.12em", textTransform:"uppercase", color:"#fff", background:"var(--accent)", padding:"5px 14px", border:"none", borderRadius:2, cursor:"pointer" }}>
                  Grade suivant →
                </button>
              )}
            </div>
          </div>
        </div>
      )}
    </>
  );
}

/* ── Sélecteur de langue ── */
function LangSelector({ lang, setLang }) {
  const [open, setOpen] = useState(false);
  const current = LANGS.find(l => l.code === lang) || LANGS[0];
  return (
    <div style={{ position:"relative" }}>
      <button
        onClick={() => setOpen(o => !o)}
        style={{ fontFamily:"'Barlow Condensed',sans-serif", fontSize:"0.62rem", fontWeight:700, letterSpacing:"0.12em", textTransform:"uppercase", color:"var(--paper)", background:"rgba(255,255,255,0.12)", border:"1px solid rgba(255,255,255,0.25)", borderRadius:3, padding:"3px 9px", cursor:"pointer", display:"flex", alignItems:"center", gap:5 }}>
        <span>{current.flag}</span>
        <span>{current.label}</span>
        <span style={{ fontSize:"0.5rem", opacity:0.7 }}>{open ? "▲" : "▼"}</span>
      </button>
      {open && (
        <div style={{ position:"absolute", right:0, top:"calc(100% + 4px)", background:"var(--ink)", border:"1px solid rgba(255,255,255,0.15)", borderRadius:3, zIndex:999, minWidth:130, overflow:"hidden", boxShadow:"0 4px 20px rgba(0,0,0,0.4)" }}>
          {LANGS.map(l => (
            <button key={l.code} onClick={() => { setLang(l.code); setOpen(false); }}
              style={{ display:"flex", alignItems:"center", gap:8, width:"100%", padding:"8px 14px", fontFamily:"'Barlow Condensed',sans-serif", fontSize:"0.65rem", fontWeight: lang===l.code ? 700 : 400, letterSpacing:"0.1em", textTransform:"uppercase", color: lang===l.code ? "var(--accent)" : "var(--paper)", background: lang===l.code ? "rgba(200,16,46,0.15)" : "none", border:"none", cursor:"pointer", borderBottom:"1px solid rgba(255,255,255,0.06)", transition:"background 0.1s" }}>
              <span>{l.flag}</span>
              <span>{l.full}</span>
              {lang===l.code && <span style={{ marginLeft:"auto", fontSize:"0.5rem", color:"var(--accent)" }}>✓</span>}
            </button>
          ))}
        </div>
      )}
    </div>
  );
}

/* ── Header ── */
function Header({ activeCategory, setActiveCategory, searchQuery, setSearchQuery, sources, lang, setLang }) {
  const { t } = React.useContext(LangContext);
  const localeMap = { fr:"fr-FR", en:"en-GB", es:"es-ES", de:"de-DE" };
  const today = new Date().toLocaleDateString(localeMap[lang]||"fr-FR",{weekday:"long",day:"numeric",month:"long",year:"numeric"});
  const categories = getCategories(t);
  return (
    <header style={{ background:"var(--paper)", borderBottom:"1px solid var(--rule)", position:"sticky", top:0, zIndex:200 }}>
      <div className="top-bar-inner">
        <span style={{ fontFamily:"'Barlow Condensed',sans-serif", fontSize:"0.6rem", letterSpacing:"0.15em", textTransform:"uppercase", opacity:0.6 }}>{today}</span>
        <div className="top-sources">
          {sources.map(s=><span key={s} style={{ fontFamily:"'Barlow Condensed',sans-serif", fontSize:"0.58rem", letterSpacing:"0.12em", textTransform:"uppercase", opacity:0.5 }}>{s}</span>)}
        </div>
        <LangSelector lang={lang} setLang={setLang} />
      </div>
      <div className="masthead">
        <div style={{ display:"flex", alignItems:"center", justifyContent:"center", gap:12 }}>
          <svg width="44" height="44" viewBox="0 0 44 44" style={{flexShrink:0}}>
            <circle cx="22" cy="22" r="22" fill="#c8102e"/>
            <text x="22" y="30" textAnchor="middle" fontFamily="Arial,sans-serif" fontWeight="900" fontSize="22" letterSpacing="-1" fill="white">JA</text>
          </svg>
          <div style={{ fontFamily:"'Playfair Display',Georgia,serif", fontSize:"clamp(2rem,6vw,3.8rem)", fontWeight:900, letterSpacing:"0.06em", lineHeight:1, textTransform:"uppercase" }}>
            Judo<span style={{color:"var(--accent)"}}>Actu</span>
          </div>
        </div>
        <div style={{ fontFamily:"'Source Serif 4',serif", fontStyle:"italic", fontSize:"0.78rem", color:"var(--muted)", marginTop:4 }}>{t.tagline}</div>
        <div className="search-wrap">
          <input value={searchQuery} onChange={e=>setSearchQuery(e.target.value)} placeholder={t.searchPlaceholder}
            style={{ fontFamily:"'Source Serif 4',serif", fontSize:"0.78rem", fontStyle:"italic", background:"transparent", border:"none", borderBottom:"1px solid var(--rule)", padding:"4px 2px", color:"var(--ink)", width:160, outline:"none" }} />
        </div>
      </div>
      <nav className="nav-bar">
        {categories.map(cat=>(
          <button key={cat.id} onClick={()=>setActiveCategory(cat.id)} style={{ fontFamily:"'Barlow Condensed',sans-serif", fontSize:"0.68rem", fontWeight:activeCategory===cat.id?700:600, letterSpacing:"0.12em", textTransform:"uppercase", color:activeCategory===cat.id?"var(--accent)":"var(--muted)", padding:"10px 14px", borderBottom:activeCategory===cat.id?"2px solid var(--accent)":"2px solid transparent", transition:"color 0.15s", whiteSpace:"nowrap", background:"none", border:"none", cursor:"pointer" }}>{cat.label}</button>
        ))}
      </nav>
    </header>
  );
}

/* ── Sidebar ── */
function Sidebar({ activeSource, setActiveSource, sourceList, count }) {
  const { t, lang } = React.useContext(LangContext);
  return (
    <aside className="sidebar">
      <div style={{ fontFamily:"'Barlow Condensed',sans-serif", fontSize:"0.6rem", fontWeight:700, letterSpacing:"0.2em", textTransform:"uppercase", color:"var(--muted)", marginBottom:12, paddingBottom:8, borderBottom:"2px solid var(--ink)" }}>{t.sourcesTitle}</div>
      {[{id:"all",name: {fr:"Toutes les sources",en:"All sources",es:"Todas las fuentes",de:"Alle Quellen"}[lang] || "Toutes les sources",color:"var(--ink)"},...sourceList].map(src=>(
        <button key={src.id} onClick={()=>setActiveSource(src.id)} style={{ display:"block", width:"100%", textAlign:"left", fontFamily:"'Source Serif 4',serif", fontSize:"0.78rem", color:activeSource===src.id?(src.color||"var(--accent)"):"var(--muted)", fontWeight:activeSource===src.id?600:400, padding:"5px 0", borderBottom:"1px solid var(--cream)", transition:"color 0.15s", background:"none", border:"none", cursor:"pointer" }}>
          {activeSource===src.id&&<span style={{color:"var(--accent)",marginRight:4,fontSize:"0.6rem"}}>▶</span>}{src.name}
        </button>
      ))}
      <div style={{ marginTop:24, paddingTop:16, borderTop:"2px solid var(--ink)" }}>
        <div style={{ fontFamily:"'Barlow Condensed',sans-serif", fontSize:"0.6rem", fontWeight:700, letterSpacing:"0.2em", textTransform:"uppercase", color:"var(--muted)", marginBottom:12 }}>En chiffres</div>
        {[{n:count,label:t.statsArticles},{n:sourceList.length,label:t.statsSources},{n:5-1,label:t.statsRubriques}].map(({n,label})=>(
          <div key={label} style={{marginBottom:10}}>
            <div style={{fontFamily:"'Playfair Display',serif",fontSize:"1.5rem",fontWeight:900,color:"var(--accent)",lineHeight:1}}>{n}</div>
            <div style={{fontFamily:"'Barlow Condensed',sans-serif",fontSize:"0.62rem",letterSpacing:"0.1em",textTransform:"uppercase",color:"var(--muted)"}}>{label}</div>
          </div>
        ))}
      </div>
      <div style={{ marginTop:24, background:"var(--cream)", border:"1px dashed var(--rule)", padding:"30px 10px", textAlign:"center", fontFamily:"'Barlow Condensed',sans-serif", fontSize:"0.55rem", letterSpacing:"0.15em", textTransform:"uppercase", color:"var(--rule)" }}>AdSense<br/>300×250</div>
    </aside>
  );
}

const AD = <div style={{ background:"var(--cream)", border:"1px dashed var(--rule)", padding:"10px 0", textAlign:"center", fontFamily:"'Barlow Condensed',sans-serif", fontSize:"0.58rem", letterSpacing:"0.15em", textTransform:"uppercase", color:"var(--rule)", margin:"20px 0" }}>Espace publicitaire 728×90 — Google AdSense</div>;

/* ══ APP ══ */
function App() {
  const [articles,       setArticles]       = useState([]);
  const [loading,        setLoading]        = useState(true);
  const [translating,    setTranslating]    = useState(false);
  const [refreshing,     setRefreshing]     = useState(false);
  const [isFallback,     setIsFallback]     = useState(false);
  const [lastUpdated,    setLastUpdated]    = useState(null);
  const [activeCategory, setActiveCategory] = useState("all");
  const [activeSource,   setActiveSource]   = useState("all");
  const [searchQuery,    setSearchQuery]    = useState("");
  const [openArticle,    setOpenArticle]    = useState(null);
  const [patchList,      setPatchList]      = useState(() => loadPatchNotes());
  const [lang,           setLang]           = useState(() => localStorage.getItem("judoactu_lang") || "fr");
  const timerRef = useRef(null);

  const t = I18N[lang] || I18N.fr;

  const handleSetLang = (code) => {
    setLang(code);
    try { localStorage.setItem("judoactu_lang", code); } catch(e) {}
  };

  const load = async (silent=false) => {
    if (!silent) setLoading(true);
    else setRefreshing(true);
    try {
      const raw  = await fetchFromGoogle();
      setTranslating(true);
      const data = await translateArticles(raw);
      setTranslating(false);
      setArticles(data);
      setIsFallback(false);
      const localeMap = { fr:"fr-FR", en:"en-GB", es:"es-ES", de:"de-DE" };
      setLastUpdated(new Date().toLocaleTimeString(localeMap[lang]||"fr-FR",{hour:"2-digit",minute:"2-digit"}));
    } catch(e) {
      console.warn("API indisponible, fallback :", e.message);
      if (!silent) { setArticles(FALLBACK_ARTICLES); setIsFallback(true); }
    } finally {
      setLoading(false);
      setRefreshing(false);
    }
  };

  useEffect(() => {
    load();
    timerRef.current = setInterval(() => load(true), REFRESH_INTERVAL);
    return () => clearInterval(timerRef.current);
  }, []);

  /* Sources uniques extraites des articles */
  const sourceList = [...new Map(articles.map(a=>[a.source,{id:a.source,name:a.sourceName||a.source,color:a.color}])).values()];
  const sourceNames = sourceList.map(s=>s.name);

  const filtered = articles.filter(a => {
    const matchCat = activeCategory==="all" || a.cat===activeCategory;
    const matchSrc = activeSource==="all"   || a.source===activeSource;
    const q = searchQuery.toLowerCase();
    return matchCat && matchSrc && (!q || (a.title||"").toLowerCase().includes(q) || (a.body||"").toLowerCase().includes(q));
  });

  const hero      = filtered.find(a=>a.featured==="TRUE"||a.featured===true) || filtered[0];
  const secondary = filtered.filter(a=>a!==hero);

  return (
    <LangContext.Provider value={{ lang, t }}>
      <Header activeCategory={activeCategory} setActiveCategory={setActiveCategory} searchQuery={searchQuery} setSearchQuery={setSearchQuery} sources={sourceNames} lang={lang} setLang={handleSetLang} />

      <div className="page-wrap">
        {activeCategory === "patch-notes" ? (
          <PatchNotesPage patchList={patchList} onUpdate={data => { setPatchList(data); savePatchNotes(data); }} />
        ) : activeCategory === "passage-grade" ? (
          <PassageGradePage />
        ) : (
          <>
            {AD}
            {isFallback && !loading && <FallbackBanner />}
            {lastUpdated && !isFallback && <RefreshBanner lastUpdated={lastUpdated} onRefresh={()=>load(true)} refreshing={refreshing} />}

            <div className="main-grid">
              <div>
                {loading ? <Spinner translating={translating} /> : filtered.length===0 ? (
                  <div style={{ textAlign:"center", padding:"4rem 0", fontFamily:"'Playfair Display',serif", fontStyle:"italic", color:"var(--muted)", fontSize:"1.1rem" }}>{t.noResult}</div>
                ) : <>
                  {hero && <Hero article={hero} onClick={setOpenArticle} />}
                  {secondary.length>0 && <div className="cards-grid">{secondary.slice(0,6).map((a,i)=><Card key={a.id} article={a} index={i} onClick={setOpenArticle}/>)}</div>}
                  {AD}
                  {secondary.length>6 && <div className="cards-grid">{secondary.slice(6).map((a,i)=><Card key={a.id} article={a} index={i+6} onClick={setOpenArticle}/>)}</div>}
                </>}
              </div>
              <Sidebar activeSource={activeSource} setActiveSource={setActiveSource} sourceList={sourceList} count={articles.length} />
            </div>
          </>
        )}

        <footer style={{ marginTop:48, paddingTop:20, borderTop:"3px double var(--ink)", display:"flex", justifyContent:"space-between", alignItems:"center", flexWrap:"wrap", gap:12 }}>
          <div style={{ fontFamily:"'Playfair Display',serif", fontSize:"1.1rem", fontWeight:900, letterSpacing:"0.06em", textTransform:"uppercase" }}>Judo<span style={{color:"var(--accent)"}}>Actu</span></div>
          <div style={{ fontFamily:"'Barlow Condensed',sans-serif", fontSize:"0.62rem", letterSpacing:"0.1em", textTransform:"uppercase", color:"var(--muted)", display:"flex", gap:20, flexWrap:"wrap" }}>
            {["À propos","Mentions légales","Politique de confidentialité","Contact"].map(l=><span key={l} style={{cursor:"pointer"}}>{l}</span>)}
          </div>
        </footer>
      </div>

      {openArticle && <Modal article={openArticle} onClose={()=>setOpenArticle(null)} />}
    </LangContext.Provider>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
